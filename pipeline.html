<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDash — Pipeline</title>
  <link rel="icon" type="image/png" href="https://ik.imagekit.io/6ezjgrjjf/00_Home_Page/letter-f.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css?v=5">
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>

<!-- Navbar (injected by nav.js) -->
<div id="nav-container"></div>

<!-- Pipeline Board -->
<div id="pipelineBoardSection" style="height:calc(100vh - 206px);display:flex;flex-direction:column;overflow:hidden;position:relative">
  <div class="d-flex align-items-center justify-content-between px-4 py-2 flex-shrink-0"
       style="border-bottom:1px solid #dee2e6">
    <!-- Pipeline year dropdown (replaces static title) -->
    <div class="position-relative" id="pbPipelineDropdownWrap">
      <button id="pbPipelineBtn" class="d-flex flex-column align-items-start border-0 bg-transparent p-0"
              style="cursor:pointer;text-align:left;line-height:1.35">
        <span class="fw-bold d-flex align-items-center gap-1" style="font-size:2.5rem;color:var(--brand-navy)">
          Pipeline&nbsp;<span id="pbPipelineYearLabel"></span>
          <span id="pbPipelineCaret"
                style="display:inline-block;width:0;height:0;margin-left:10px;vertical-align:middle;
                       border-left:8px solid transparent;border-right:8px solid transparent;
                       border-top:10px solid #4b5563"></span>
        </span>
        <span class="text-muted" style="font-size:.8rem" id="pbPipelineSubtitle">Loading pipelines…</span>
      </button>
      <div id="pbPipelineMenu"
           style="display:none;position:absolute;top:calc(100% + 6px);left:0;z-index:500;
                  background:#fff;border:1px solid #dee2e6;border-radius:8px;
                  box-shadow:0 6px 20px rgba(0,0,0,.13);min-width:200px;padding:4px 0">
      </div>
    </div>
    <div class="d-flex gap-2 align-items-center">
      <button class="btn btn-primary btn-sm" id="btnNewCostGrid" style="display:none">+ New Proposal</button>
    </div>
  </div>
  <!-- 5-column kanban board -->
  <div id="pbColumnsContainer" class="d-flex gap-0" style="flex:1;min-height:0;overflow-x:auto;overflow-y:hidden;align-items:stretch"></div>
  <!-- Sticky totals bar (outside overflow container so sticky works) -->
  <div id="pbTotalsBar" class="d-flex"></div>
  <!-- Detail panel (slide-in from right) -->
  <div id="pbDetailPanel"
       style="display:none;position:absolute;top:0;right:0;bottom:0;width:860px;max-width:100%;
              background:#fff;border-left:2px solid #dee2e6;box-shadow:-4px 0 16px rgba(0,0,0,.12);
              z-index:200;flex-direction:column">
    <div class="d-flex align-items-center justify-content-between px-3 py-2 flex-shrink-0"
         style="border-bottom:1px solid #dee2e6;background:#0B1840;color:#fff">
      <span class="fw-semibold" style="font-size:var(--text-md)">Offer detail</span>
      <div class="d-flex gap-2 align-items-center">
        <button class="btn btn-sm btn-outline-danger px-3" id="pbBtnDeleteVersion" style="display:none;font-size:var(--text-xs);font-weight:600" title="Delete this Draft version">🗑 Delete</button>
        <button class="btn btn-sm btn-light px-3" id="pbBtnCloneCg" style="font-size:var(--text-xs);font-weight:600" title="Clone this version as a new proposal">⧉ Clone</button>
        <button class="btn btn-sm btn-light px-3" id="pbBtnShareCg" style="font-size:var(--text-xs);font-weight:600" title="Share this cost grid">🔗 Share</button>
        <button class="btn btn-sm btn-light px-3" id="pbBtnOpenCg" style="font-size:var(--text-xs);font-weight:600" title="Open full cost grid editor">✏️ Edit</button>
        <button class="btn btn-sm btn-link text-white p-0" onclick="pbCloseDetailPanel()"
                style="font-size:1.1rem;line-height:1" title="Close">×</button>
      </div>
    </div>
    <div id="pbDetailContent" class="d-flex flex-grow-1" style="min-height:0"></div>
  </div>
</div>

<!-- ── MODALS ── -->

<!-- Confirm -->
<div class="modal fade" id="confirmModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered" style="max-width:460px">
    <div class="modal-content shadow-lg">
      <div class="modal-header border-0 pb-1">
        <h6 class="modal-title fw-bold" id="confirmModalTitle">⚠️ Confirm</h6>
      </div>
      <div class="modal-body pt-1">
        <p id="confirmModalMessage" class="mb-0" style="white-space:pre-line;font-size:.92rem"></p>
      </div>
      <div class="modal-footer border-0 pt-2">
        <button class="btn btn-secondary" id="confirmModalCancel" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-danger" id="confirmModalOk">Confirm</button>
      </div>
    </div>
  </div>
</div>

<!-- New Proposal -->
<div class="modal fade" id="cgNewGridModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:400px">
    <div class="modal-content">
      <div class="modal-header border-0 pb-1">
        <h6 class="modal-title fw-bold">📋 New Proposal</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <label class="form-label small fw-semibold mb-1">Proposal name</label>
        <input type="text" class="form-control form-control-sm" id="cgNewGridName"
               placeholder="e.g. Project Alpha — Proposal" autofocus>
        <div id="cgNewGridError" class="text-danger small mt-2 d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="btnCgCreateGrid">Create</button>
      </div>
    </div>
  </div>
</div>

<!-- Clone Proposal -->
<div class="modal fade" id="cgCloneModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered" style="max-width:400px">
    <div class="modal-content">
      <div class="modal-header border-0 pb-1">
        <h6 class="modal-title fw-bold">⧉ Clone Proposal</h6>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <p class="text-muted small mb-2">Cloning: <strong id="cgCloneSourceName"></strong></p>
        <label class="form-label small fw-semibold mb-1">New proposal name</label>
        <input type="text" class="form-control form-control-sm" id="cgCloneGridName"
               placeholder="e.g. Project Alpha — Proposal v2" autofocus>
        <div id="cgCloneError" class="text-danger small mt-2 d-none"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary btn-sm" id="btnCgClone">Clone</button>
      </div>
    </div>
  </div>
</div>

<!-- JSON Viewer (reusable) -->
<div class="modal fade" id="jsonViewerModal" tabindex="-1">
  <div class="modal-dialog modal-xl modal-dialog-scrollable" style="max-width:860px">
    <div class="modal-content">
      <div class="modal-header border-0 pb-1">
        <h5 class="modal-title fw-bold font-monospace" id="jsonViewerTitle">{ } JSON</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <div class="px-3 py-2 d-flex gap-2 align-items-center border-bottom" style="background:#f8f9fa">
          <button class="btn btn-outline-secondary btn-sm" id="btnJsonCopy">📋 Copy</button>
          <button class="btn btn-outline-secondary btn-sm" id="btnJsonExport">⬇ Export .json</button>
          <button class="btn btn-outline-secondary btn-sm" id="btnJsonImport">⬆ Import .json</button>
          <span class="text-muted small ms-auto">The textarea is editable — modify and click <strong>Apply</strong>.</span>
        </div>
        <div class="p-3">
          <textarea id="jsonViewerContent" class="form-control font-monospace"
            style="min-height:480px;font-size:.82rem;line-height:1.5;resize:vertical"
            spellcheck="false" autocomplete="off"></textarea>
          <div id="jsonViewerError" class="text-danger small mt-2 d-none"></div>
        </div>
      </div>
      <div class="modal-footer border-0">
        <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
        <button class="btn btn-primary btn-sm" id="btnJsonApply">✓ Apply JSON</button>
      </div>
    </div>
  </div>
</div>

<!-- Auto-save toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:9999">
  <div id="cgAutoSaveToast" class="toast align-items-center text-bg-secondary border-0" role="alert" data-bs-delay="2000">
    <div class="d-flex">
      <div class="toast-body" style="font-size:.85rem">💾 Auto-saved</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<!-- ── SCRIPTS ── -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js?v=4"></script>
<script src="js/core.js?v=2"></script>
<script src="js/settings.js"></script>
<script src="js/notifications.js"></script>
<script src="js/roles.js"></script>
<script type="module" src="js/lib/cfg-parse.js?v=1"></script>
<script type="module" src="js/lib/costgrid-calc.js?v=1"></script>
<script src="js/costgrid.js?v=2"></script>
<script src="js/clients.js"></script>
<script src="js/programs.js"></script>
<script src="js/pipeline-board.js?v=10"></script>
<script src="js/api-sync.js?v=14"></script>
<script src="js/shares.js"></script>
<script src="js/nav.js?v=4"></script>

<script>
// ── PAGE-SPECIFIC NAVIGATION OVERRIDES ───────────────────────────────────────
// Replace section show/hide with URL navigation.

function showCostGridEditorView(cgId, versionId) {
  const p = new URLSearchParams({ cgId, verId: versionId });
  window.location.href = '/costgrid.html?' + p;
}

function showPipelineBoardView() {
  renderPipelineBoard();
}

function pbGoToReporting(projectId) {
  pbCloseDetailPanel();
  window.location.href = '/portfolio.html?projectId=' + encodeURIComponent(projectId);
}

function updateNavState() {}    // no-op: nav is static HTML
function cgHideAll() {}         // no-op: no other sections to hide on this page

// ── INIT ─────────────────────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', async () => {
  loadSettings();
  loadConfig();   // no-op: config.projects is populated by loadConfigFromApi()

  const user = await initNav('pipeline', { breadcrumbs: [
    { label: 'Home', href: '/pipeline.html' },
    { label: 'Pipeline' },
  ]});
  if (!user) return;

  await Promise.all([loadClientsFromApi(), loadProgramsFromApi(), loadRolesFromApi()]);
  Api.clientGroups.list().then(gs => { _pbClientGroups = gs; }).catch(() => {});
  Api.ratecards.list().then(rcs => { _pbRatecards = rcs; }).catch(() => {});

  // ── Pipeline year dropdown ────────────────────────────────────────────────────
  const _currentYear = new Date().getFullYear();
  const _isAdmin     = user.role === 'admin';

  // Fetch admin-managed pipeline years (active only for non-admin, all for admin)
  let pipelineYears = [];
  try { pipelineYears = await Api.pipelineYears.list(); } catch (e) {}

  // Validate URL year param
  const _urlParams = new URLSearchParams(window.location.search);
  let _reqYear = _urlParams.get('year') ? parseInt(_urlParams.get('year')) : null;
  const _validYear = pipelineYears.find(py => py.year === _reqYear);

  if (!_validYear) {
    // Prefer current calendar year if active; fall back to nearest available year
    const _currentYearPy = pipelineYears.find(py => py.year === _currentYear);
    _reqYear = _currentYearPy
      ? _currentYear
      : pipelineYears.length ? pipelineYears[0].year : _currentYear;
    window.history.replaceState({}, '', '?year=' + _reqYear);
  }

  _pbSelectedYear = _reqYear;

  // Render dropdown
  function _pbRenderDropdown() {
    document.getElementById('pbPipelineYearLabel').textContent = _pbSelectedYear;
    document.getElementById('pbPipelineSubtitle').textContent  = 'All cost grid offers organised by deal stage';
    const menu = document.getElementById('pbPipelineMenu');
    if (!pipelineYears.length) {
      menu.innerHTML = '<div class="px-3 py-2 text-muted" style="font-size:.82rem">No active pipelines</div>';
      document.getElementById('pbPipelineCaret').style.display = 'none';
      return;
    }
    menu.innerHTML = pipelineYears.map(py => `
      <button type="button" data-py="${py.year}"
              style="display:block;width:100%;text-align:left;border:none;
                     background:${py.year === _pbSelectedYear ? '#f0f4ff' : 'transparent'};
                     color:${py.year === _pbSelectedYear ? 'var(--brand-navy)' : '#374151'};
                     font-weight:${py.year === _pbSelectedYear ? '700' : '400'};
                     padding:8px 16px;font-size:.875rem;cursor:pointer"
              onmouseover="this.style.background='#f8f9fa'"
              onmouseout="this.style.background='${py.year === _pbSelectedYear ? '#f0f4ff' : 'transparent'}'">
        Pipeline ${py.year}${py.year === _pbSelectedYear ? ' ✓' : ''}
      </button>`).join('');
    menu.querySelectorAll('[data-py]').forEach(btn => {
      btn.addEventListener('click', () => {
        window.location.href = '/pipeline.html?year=' + btn.dataset.py;
      });
    });
  }
  _pbRenderDropdown();

  // Toggle dropdown open/close
  document.getElementById('pbPipelineBtn').addEventListener('click', e => {
    e.stopPropagation();
    const m = document.getElementById('pbPipelineMenu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
  });
  document.addEventListener('click', () => {
    const m = document.getElementById('pbPipelineMenu');
    if (m) m.style.display = 'none';
  });

  // Show "+ New Cost Grid" only when on an active year (non-past is not the constraint anymore — just active)
  const _selPy = pipelineYears.find(py => py.year === _pbSelectedYear);
  document.getElementById('btnNewCostGrid').style.display = (_selPy?.active !== false) ? '' : 'none';

  // Seed caches from API, then render
  await loadCurrenciesFromApi();
  await cgSyncFromApi(_pbSelectedYear);
  await Promise.all([loadConfigFromApi(), loadPipelineBudgetsFromApi()]);
  renderPipelineBoard();

  // Pipeline board buttons
  document.getElementById('btnNewCostGrid').addEventListener('click', () => {
    document.getElementById('cgNewGridName').value = '';
    document.getElementById('cgNewGridError').classList.add('d-none');
    bootstrap.Modal.getOrCreateInstance(document.getElementById('cgNewGridModal')).show();
  });
  document.getElementById('cgNewGridModal').addEventListener('shown.bs.modal', () => {
    document.getElementById('cgNewGridName').focus();
  });
  document.getElementById('btnCgCreateGrid').addEventListener('click', cgCreateNewGrid);

  document.getElementById('cgCloneModal').addEventListener('shown.bs.modal', () => {
    document.getElementById('cgCloneGridName').focus();
  });
  document.getElementById('btnCgClone').addEventListener('click', cgCloneGrid);
  // JSON viewer modal buttons
  document.getElementById('btnJsonCopy').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('jsonViewerContent').value).catch(() => {});
  });
  document.getElementById('btnJsonExport').addEventListener('click', () => {
    const text = document.getElementById('jsonViewerContent').value;
    const blob = new Blob([text], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = _jsonViewerFilename; a.click();
    URL.revokeObjectURL(url);
  });
  document.getElementById('btnJsonImport').addEventListener('click', () => {
    const inp = document.createElement('input');
    inp.type = 'file'; inp.accept = '.json';
    inp.onchange = e => {
      const file = e.target.files[0]; if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          JSON.parse(ev.target.result);
          document.getElementById('jsonViewerContent').value = ev.target.result;
          document.getElementById('jsonViewerError').classList.add('d-none');
        } catch(err) {
          const el = document.getElementById('jsonViewerError');
          el.textContent = 'Invalid JSON: ' + err.message;
          el.classList.remove('d-none');
        }
      };
      reader.readAsText(file);
    };
    inp.click();
  });
  document.getElementById('btnJsonApply').addEventListener('click', () => {
    const errEl = document.getElementById('jsonViewerError');
    try {
      const parsed = JSON.parse(document.getElementById('jsonViewerContent').value);
      if (_jsonViewerOnSave) { _jsonViewerOnSave(parsed); }
      bootstrap.Modal.getInstance(document.getElementById('jsonViewerModal'))?.hide();
      errEl.classList.add('d-none');
    } catch(err) {
      errEl.textContent = 'Invalid JSON: ' + err.message;
      errEl.classList.remove('d-none');
    }
  });

});
</script>

</body>
</html>
