<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PDash – Data Migration</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/tokens.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: var(--sand-50, #f8f7f4); }
    .log-ok   { color: #197a38; }
    .log-skip { color: #6b7280; }
    .log-warn { color: #b45309; }
    .log-err  { color: #c0392b; }
    #progressLog { max-height: 420px; overflow-y: auto; border: 1px solid var(--sand-200, #e5e1d8);
                   border-radius: 6px; padding: 12px 14px; background: #fff; }
    .stat-badge { display: inline-block; min-width: 28px; text-align: center;
                  background: var(--indigo-100, #dbe4ff); color: var(--indigo-700, #3451b2);
                  border-radius: 4px; font-size: var(--text-xs, 0.75rem); padding: 1px 6px; font-weight: 600; }
    .stat-badge.zero { background: var(--sand-100, #f0ede6); color: var(--sand-500, #9a9080); }
  </style>
</head>
<body>
  <div id="nav-container"></div>

  <div class="container py-4" style="max-width:780px">
    <h4 class="mb-1 fw-semibold" style="color:var(--brand-navy,#0B1840)">Data Migration</h4>
    <p class="text-muted mb-4" style="font-size:var(--text-sm,0.8rem)">
      Transfers existing localStorage data to the backend database.
      All writes are upserts — safe to run multiple times. The page never deletes local data automatically.
    </p>

    <!-- Scan card -->
    <div class="card mb-3 border-0 shadow-sm">
      <div class="card-header bg-white fw-semibold border-bottom" style="font-size:var(--text-sm,0.8rem)">
        localStorage scan
      </div>
      <div class="card-body py-3" id="scanBody">
        <div class="text-muted" style="font-size:var(--text-sm,0.8rem)">Scanning…</div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="d-flex gap-2 mb-4 align-items-center flex-wrap" id="actionRow">
      <button id="runBtn" class="btn btn-primary btn-sm" disabled>Run Migration</button>
      <button id="rescanBtn" class="btn btn-outline-secondary btn-sm">Re-scan</button>
      <span id="actionStatus" class="text-muted ms-1" style="font-size:var(--text-xs,0.75rem)"></span>
    </div>

    <!-- Progress log -->
    <div id="progressPanel" class="d-none">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <span class="fw-semibold" style="font-size:var(--text-sm,0.8rem)">Migration log</span>
        <span id="progressSummary" style="font-size:var(--text-xs,0.75rem)" class="text-muted"></span>
      </div>
      <div id="progressLog" style="font-size:var(--text-2xs,0.70rem);line-height:1.75;font-family:monospace"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
  <script src="js/api.js?v=2"></script>
  <script>
    // Minimal esc() — core.js not included to avoid side-effects
    function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  </script>
  <script src="js/nav.js"></script>

  <script>
  // ── SCAN ──────────────────────────────────────────────────────────────────────

  function scanLocalStorage() {
    const data = { clients: [], programs: [], roles: [], costGrids: [], projects: [], timesheets: [] };

    try { data.clients  = JSON.parse(localStorage.getItem('PDash_clients')  || '[]'); } catch(e) {}
    try { data.programs = JSON.parse(localStorage.getItem('PDash_programs') || '[]'); } catch(e) {}
    try { data.roles    = JSON.parse(localStorage.getItem('PDash_roles')    || '[]'); } catch(e) {}

    try {
      const idx = JSON.parse(localStorage.getItem('PDash_cg_index') || '[]');
      for (const cgId of idx) {
        const cg = JSON.parse(localStorage.getItem('PDash_cg_' + cgId) || 'null');
        if (cg) data.costGrids.push(cg);
      }
    } catch(e) {}

    try {
      const cfg = JSON.parse(localStorage.getItem('PDash_config') || '{}');
      data.projects = cfg.projects || [];
    } catch(e) {}

    try {
      const idx = JSON.parse(localStorage.getItem('PDash_data_index') || '[]');
      for (const pid of idx) {
        const rows = JSON.parse(localStorage.getItem('PDash_data_' + pid) || '[]');
        if (rows && rows.length) data.timesheets.push({ projectId: pid, rows });
      }
    } catch(e) {}

    return data;
  }

  function renderScan(data) {
    const totalVersions  = data.costGrids.reduce((s, cg) => s + (cg.versions || []).length, 0);
    const totalTsRows    = data.timesheets.reduce((s, ts) => s + ts.rows.length, 0);

    const hasAnything = data.clients.length || data.programs.length || data.roles.length ||
                        data.costGrids.length || data.projects.length || data.timesheets.length;

    const badge = (n) => `<span class="stat-badge${n === 0 ? ' zero' : ''}">${n}</span>`;

    document.getElementById('scanBody').innerHTML = `
      <table class="table table-sm mb-0" style="font-size:var(--text-sm,0.8rem)">
        <tbody>
          <tr><td class="text-muted border-0 ps-0">Clients</td>    <td class="border-0">${badge(data.clients.length)}</td></tr>
          <tr><td class="text-muted border-0 ps-0">Programs</td>   <td class="border-0">${badge(data.programs.length)}</td></tr>
          <tr><td class="text-muted border-0 ps-0">Roles</td>      <td class="border-0">${badge(data.roles.length)}</td></tr>
          <tr><td class="text-muted border-0 ps-0">Cost grids</td> <td class="border-0">${badge(data.costGrids.length)} <span class="text-muted" style="font-size:var(--text-xs,0.75rem)">(${totalVersions} version${totalVersions!==1?'s':''})</span></td></tr>
          <tr><td class="text-muted border-0 ps-0">Projects</td>   <td class="border-0">${badge(data.projects.length)}</td></tr>
          <tr><td class="text-muted border-0 ps-0">Timesheets</td> <td class="border-0">${badge(data.timesheets.length)} <span class="text-muted" style="font-size:var(--text-xs,0.75rem)">(${totalTsRows} row${totalTsRows!==1?'s':''})</span></td></tr>
        </tbody>
      </table>
      ${!hasAnything ? '<p class="text-muted mt-2 mb-0" style="font-size:var(--text-xs)">Nothing found in localStorage. Migration not needed.</p>' : ''}
    `;

    const runBtn = document.getElementById('runBtn');
    runBtn.disabled = !hasAnything;
    return data;
  }

  // ── LOGGING ───────────────────────────────────────────────────────────────────

  let _logOk = 0, _logErr = 0, _logSkip = 0;

  function log(msg, type = 'ok') {
    if (type === 'ok')   _logOk++;
    if (type === 'err')  _logErr++;
    if (type === 'skip') _logSkip++;

    const el = document.getElementById('progressLog');
    const line = document.createElement('div');
    line.className = 'log-' + type;
    line.textContent = msg;
    el.appendChild(line);
    el.scrollTop = el.scrollHeight;

    document.getElementById('progressSummary').textContent =
      `${_logOk} ok · ${_logSkip} skipped · ${_logErr} error${_logErr !== 1 ? 's' : ''}`;
  }

  function logSection(title) {
    const el = document.getElementById('progressLog');
    const line = document.createElement('div');
    line.style.cssText = 'color:#6b7280;margin-top:8px;border-top:1px solid #e5e7eb;padding-top:6px;font-weight:600';
    line.textContent = '── ' + title;
    el.appendChild(line);
  }

  // ── DATE HELPERS ──────────────────────────────────────────────────────────────

  function toMDY(v) {
    if (!v) return '';
    const d = v instanceof Date ? v : new Date(v);
    if (isNaN(d)) return String(v);
    return String(d.getMonth() + 1).padStart(2, '0') + '/' +
           String(d.getDate()).padStart(2, '0')       + '/' + d.getFullYear();
  }

  // ── XLSX BUILDER (for timesheet re-upload) ───────────────────────────────────

  function buildTimesheetFile(projectId, rows) {
    const headers = ['Date','Job Role: Name','Owner: Name','Hours','Task/Issue','Notes','D365 Project ID','WF Project Name'];
    const aoa = [headers, ...rows.map(r => [
      toMDY(r.date), r.role || '', r.owner || '', r.hours || 0,
      r.task || '', r.notes || '', r.projectId || projectId, r.projectName || '',
    ])];
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Sheet1');
    const out  = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
    const blob = new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    return new File([blob], 'timesheet_' + projectId + '.xlsx', { type: blob.type });
  }

  // ── UPSERT HELPERS ────────────────────────────────────────────────────────────

  async function upsertCostGrid(cg) {
    try { await Api.costGrids.update(cg.id, { name: cg.name }); return true; }
    catch {
      try { await Api.costGrids.create({ id: cg.id, name: cg.name }); return true; }
      catch(e) { log('  ❌ grid "' + cg.name + '": ' + e.message, 'err'); return false; }
    }
  }

  async function upsertVersion(cgId, ver) {
    const { phases, roles: verRoles, ...meta } = ver;
    const payload = {
      label:          meta.versionLabel || 'v1',
      pipeline:       meta.pipeline     || null,
      startDate:      meta.startDate    || null,
      endDate:        meta.endDate      || null,
      currency:       meta.currency     || 'EUR',
      note:           meta.note         || '',
      status:         meta.status       || 'draft',
      projectName:    meta.projectName  || '',
      linkedProjects: meta.linkedProjects || [],
    };
    try { await Api.costGrids.versions.update(cgId, ver.versionId, payload); return { phases, verRoles }; }
    catch {
      try { await Api.costGrids.versions.create(cgId, { id: ver.versionId, ...payload }); return { phases, verRoles }; }
      catch(e) { log('    ❌ version "' + payload.label + '": ' + e.message, 'err'); return null; }
    }
  }

  // ── MAIN MIGRATION ────────────────────────────────────────────────────────────

  async function runMigration(data) {
    _logOk = 0; _logErr = 0; _logSkip = 0;
    document.getElementById('progressPanel').classList.remove('d-none');
    document.getElementById('runBtn').disabled = true;
    document.getElementById('rescanBtn').disabled = true;
    document.getElementById('actionStatus').textContent = 'Running…';

    // ── 1. CLIENTS ─────────────────────────────────────────────────────────────
    logSection('Clients');
    const clientIdMap = {};
    let existingClients = [];
    try { existingClients = await Api.clients.list(); } catch(e) { log('⚠️ Could not fetch clients: ' + e.message, 'warn'); }

    for (const c of data.clients) {
      const existing = existingClients.find(x => x.name.toLowerCase() === c.name.toLowerCase());
      if (existing) {
        clientIdMap[c.id] = existing.id;
        log('↩ Client "' + c.name + '" already exists — mapped', 'skip');
      } else {
        try {
          const created = await Api.clients.create(c.name);
          clientIdMap[c.id] = created.id;
          log('✅ Client "' + c.name + '" created');
        } catch(e) {
          log('❌ Client "' + c.name + '": ' + e.message, 'err');
          clientIdMap[c.id] = c.id;
        }
      }
    }

    // ── 2. PROGRAMS ────────────────────────────────────────────────────────────
    logSection('Programs');
    const programIdMap = {};
    let existingPrograms = [];
    try { existingPrograms = await Api.programs.list(); } catch(e) { log('⚠️ Could not fetch programs: ' + e.message, 'warn'); }

    for (const p of data.programs) {
      const existing = existingPrograms.find(x => x.id === p.id || x.name.toLowerCase() === p.name.toLowerCase());
      if (existing) {
        programIdMap[p.id] = existing.id;
        log('↩ Program "' + p.name + '" already exists — mapped', 'skip');
      } else {
        try {
          const created = await Api.programs.create(p.id, p.name);
          programIdMap[p.id] = created?.id || p.id;
          log('✅ Program "' + p.name + '" created');
        } catch(e) {
          log('❌ Program "' + p.name + '": ' + e.message, 'err');
          programIdMap[p.id] = p.id;
        }
      }
    }

    // ── 3. ROLES ───────────────────────────────────────────────────────────────
    logSection('Roles');
    let existingRoles = [];
    try { existingRoles = await Api.roles.list(); } catch(e) { log('⚠️ Could not fetch roles: ' + e.message, 'warn'); }

    for (const r of data.roles) {
      const existing = existingRoles.find(x => x.id === r.id || (x.label || '').toLowerCase() === (r.label || '').toLowerCase());
      if (existing) {
        log('↩ Role "' + r.label + '" already exists', 'skip');
      } else {
        try {
          await Api.roles.create({ id: r.id, label: r.label, code: r.code || '', hourly_rate: r.rate || 0 });
          log('✅ Role "' + r.label + '" created');
        } catch(e) {
          log('❌ Role "' + r.label + '": ' + e.message, 'err');
        }
      }
    }

    // ── 4. COST GRIDS ──────────────────────────────────────────────────────────
    logSection('Cost Grids');
    for (const cg of data.costGrids) {
      const ok = await upsertCostGrid(cg);
      if (!ok) continue;
      log('✅ Cost grid "' + cg.name + '"');

      for (const ver of (cg.versions || [])) {
        const result = await upsertVersion(cg.id, ver);
        if (!result) continue;
        const { phases, verRoles } = result;
        log('  ✅ Version "' + (ver.versionLabel || 'v1') + '"');

        if ((phases || []).length || (verRoles || []).length) {
          try {
            await Api.costGrids.versions.saveStructure(cg.id, ver.versionId, {
              phases: phases || [],
              roles:  verRoles || [],
            });
            log('    ✅ Structure: ' + (phases||[]).length + ' phases, ' + (verRoles||[]).length + ' roles');
          } catch(e) {
            log('    ❌ Structure: ' + e.message, 'err');
          }
        }
      }
    }

    // ── 5. PROJECTS ────────────────────────────────────────────────────────────
    logSection('Projects');
    for (const proj of data.projects) {
      const { tasks, phasing, planning, ptc, groups, costGridRef, ...meta } = proj;
      meta.clientId  = clientIdMap[meta.clientId]   || meta.clientId;
      meta.programId = programIdMap[meta.programId] || meta.programId;

      try { await Api.projects.update(proj.id, meta); log('✅ Project "' + proj.name + '" updated'); }
      catch {
        try { await Api.projects.create({ ...meta, id: proj.id }); log('✅ Project "' + proj.name + '" created'); }
        catch(e) { log('❌ Project "' + proj.name + '": ' + e.message, 'err'); continue; }
      }

      if (tasks?.length) {
        try { await Api.projects.saveTasks(proj.id, tasks); }
        catch(e) { log('  ⚠️ Tasks "' + proj.name + '": ' + e.message, 'warn'); }
      }
      if (phasing && Object.keys(phasing).length) {
        try { await Api.projects.phasing(proj.id, phasing); }
        catch(e) { log('  ⚠️ Phasing "' + proj.name + '": ' + e.message, 'warn'); }
      }
      if (ptc?.length) {
        try { await Api.projects.ptc(proj.id, ptc); }
        catch(e) { log('  ⚠️ PTC "' + proj.name + '": ' + e.message, 'warn'); }
      }
      if (planning && Object.keys(planning).length) {
        try { await Api.projects.planning(proj.id, planning); }
        catch(e) { log('  ⚠️ Planning "' + proj.name + '": ' + e.message, 'warn'); }
      }
      if (groups?.length) {
        try { await Api.projects.groups(proj.id, groups); }
        catch(e) { log('  ⚠️ Groups "' + proj.name + '": ' + e.message, 'warn'); }
      }
    }

    // ── 6. TIMESHEETS ──────────────────────────────────────────────────────────
    logSection('Timesheets');
    for (const ts of data.timesheets) {
      try {
        const file = buildTimesheetFile(ts.projectId, ts.rows);
        await Api.timesheets.upload(file);
        log('✅ Timesheet project ' + ts.projectId + ' (' + ts.rows.length + ' rows)');
      } catch(e) {
        log('❌ Timesheet ' + ts.projectId + ': ' + e.message, 'err');
      }
    }

    // ── DONE ───────────────────────────────────────────────────────────────────
    const status = document.getElementById('actionStatus');
    if (_logErr === 0) {
      status.textContent = '✅ Complete — ' + _logOk + ' items migrated.';
      status.className = 'text-success ms-1';
    } else {
      status.textContent = '⚠️ Done with ' + _logErr + ' error' + (_logErr !== 1 ? 's' : '') + '.';
      status.className = 'text-warning ms-1';
    }
    document.getElementById('rescanBtn').disabled = false;
  }

  // ── INIT ──────────────────────────────────────────────────────────────────────

  let _scanData = null;

  function doScan() {
    _scanData = scanLocalStorage();
    renderScan(_scanData);
  }

  document.addEventListener('DOMContentLoaded', async () => {
    await initNav('migration', { hideSettings: true });

    doScan();

    document.getElementById('runBtn').addEventListener('click', () => {
      if (_scanData) runMigration(_scanData);
    });
    document.getElementById('rescanBtn').addEventListener('click', doScan);
  });
  </script>
</body>
</html>
