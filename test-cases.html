<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDash — Test Cases</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sw: 268px;
      --pass:    #16a34a;
      --fail:    #dc2626;
      --gray:    #6b7280;
      --bg:      #f3f4f6;
      --card:    #ffffff;
      --border:  #e5e7eb;
      --sbg:     #111827;
      --stext:   #d1d5db;
      --accent:  #2563eb;
      --text:    #111827;
      --muted:   #6b7280;
    }

    html, body { height: 100%; overflow: hidden; }
    body { display: flex; font-family: system-ui, -apple-system, sans-serif;
           background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sw); min-width: var(--sw);
      height: 100vh; background: var(--sbg);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .sb-head {
      padding: 18px 16px 14px;
      font-size: 13px; font-weight: 700; color: #f9fafb;
      border-bottom: 1px solid #1f2937; flex-shrink: 0;
    }
    .sb-head small { display: block; font-size: 11px; font-weight: 400; color: #9ca3af; margin-top: 2px; }
    .sb-link {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 16px; color: var(--stext); cursor: pointer;
      font-size: 12.5px; border-left: 3px solid transparent;
      transition: background 0.12s, color 0.12s; user-select: none;
    }
    .sb-link:hover { background: #1f2937; color: #fff; }
    .sb-link.active { background: #1e3a5f; border-left-color: var(--accent); color: #fff; }
    .sb-link .name { flex: 1; min-width: 0; }
    .sb-link .cnt {
      font-size: 11px; white-space: nowrap; flex-shrink: 0;
      padding: 1px 6px; border-radius: 99px; background: #1f2937; color: #9ca3af;
    }
    .sb-link.active .cnt { background: #1d4ed8; color: #bfdbfe; }
    .sb-link .dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
      background: var(--gray);
    }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Topbar ── */
    .topbar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 14px 24px 12px; flex-shrink: 0;
    }
    .tb-row1 { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .tb-title { font-size: 17px; font-weight: 700; }
    .tb-stats { display: flex; gap: 14px; font-size: 12px; color: var(--muted); align-items: center; }
    .stat-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px; border-radius: 99px; font-weight: 600;
    }
    .stat-badge.pass { background: #dcfce7; color: var(--pass); }
    .stat-badge.fail { background: #fee2e2; color: var(--fail); }
    .stat-badge.un   { background: #f3f4f6; color: var(--gray); }
    .tb-prog {
      height: 5px; background: #e5e7eb; border-radius: 99px;
      overflow: hidden; margin-bottom: 10px;
    }
    .tb-prog-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--pass) 0%, #4ade80 100%);
      transition: width 0.3s;
    }
    .tb-row2 { display: flex; align-items: center; gap: 8px; }
    .filter-label { font-size: 11px; color: var(--muted); margin-right: 2px; }
    .pill {
      padding: 4px 12px; border-radius: 99px;
      border: 1px solid var(--border); background: #fff;
      color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.12s;
    }
    .pill:hover { border-color: #9ca3af; color: var(--text); }
    .pill.active        { background: #1e3a5f; border-color: #1e3a5f; color: #fff; }
    .pill.active.p-pass { background: var(--pass); border-color: var(--pass); }
    .pill.active.p-fail { background: var(--fail); border-color: var(--fail); }
    .reset-btn {
      margin-left: auto; padding: 5px 13px;
      border: 1px solid #fca5a5; background: #fff; color: var(--fail);
      border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.12s;
    }
    .reset-btn:hover { background: #fef2f2; }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px 24px 40px; }

    .sec-block { margin-bottom: 28px; }
    .sec-block.hidden { display: none; }

    .sec-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 10px; padding-bottom: 8px; border-bottom: 2px solid var(--border);
    }
    .sec-head h2 { font-size: 15px; font-weight: 700; flex: 1; }
    .sec-mini-wrap { display: flex; align-items: center; gap: 8px; }
    .sec-mini-bar {
      width: 64px; height: 4px; background: #e5e7eb; border-radius: 99px; overflow: hidden;
    }
    .sec-mini-fill { height: 100%; background: var(--pass); border-radius: 99px; transition: width 0.3s; }
    .sec-mini-txt { font-size: 11px; color: var(--muted); white-space: nowrap; }

    .sub-title {
      font-size: 12px; font-weight: 600; color: #374151;
      margin: 14px 0 8px; padding-left: 8px;
      border-left: 3px solid #9ca3af;
    }

    /* ── Case card ── */
    .case-card {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 11px 14px; background: var(--card);
      border: 1px solid var(--border); border-left: 3px solid transparent;
      border-radius: 8px; margin-bottom: 7px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .case-card:hover { box-shadow: 0 1px 6px rgba(0,0,0,0.07); }
    .case-card.s-pass { border-left-color: var(--pass); background: #f0fdf4; }
    .case-card.s-fail { border-left-color: var(--fail); background: #fef2f2; }
    .case-card.hidden { display: none; }

    .tog {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2px solid #d1d5db; background: #fff;
      cursor: pointer; font-size: 15px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.18s; color: #d1d5db;
      margin-top: 1px;
    }
    .tog:hover { border-color: var(--accent); color: var(--accent); }
    .tog.pass { background: var(--pass); border-color: var(--pass); color: #fff; }
    .tog.fail { background: var(--fail); border-color: var(--fail); color: #fff; }

    .cb { flex: 1; min-width: 0; }
    .ch { display: flex; align-items: baseline; gap: 8px; margin-bottom: 3px; }
    .cid {
      font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em;
      padding: 1px 6px; border-radius: 4px;
      background: #f3f4f6; color: #374151;
      white-space: nowrap; flex-shrink: 0; font-family: monospace;
    }
    .sc { font-weight: 600; font-size: 13.5px; }
    .auto-badge {
      margin-left: auto; font-size: 10px; padding: 1px 7px;
      border-radius: 4px; background: #eff6ff; color: #1d4ed8;
      white-space: nowrap; flex-shrink: 0; font-weight: 600;
    }
    .steps {
      font-size: 12px; color: #4b5563; margin-bottom: 3px;
    }
    .steps::before { content: '▸ '; color: #9ca3af; }
    .exp { font-size: 12px; color: var(--muted); }
    .exp::before { content: '→ '; color: #9ca3af; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 99px; }
    .sidebar::-webkit-scrollbar-thumb { background: #374151; }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar"></aside>

<div class="main">
  <header class="topbar">
    <div class="tb-row1">
      <span class="tb-title">PDash — Test Cases</span>
      <div class="tb-stats" id="stats"></div>
    </div>
    <div class="tb-prog"><div class="tb-prog-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="tb-row2">
      <span class="filter-label">Filter:</span>
      <button class="pill active"        data-status="all">All</button>
      <button class="pill p-pass"        data-status="pass">✓ Passed</button>
      <button class="pill p-fail"        data-status="fail">✗ Failed</button>
      <button class="pill"               data-status="untested">⬜ Untested</button>
      <button class="reset-btn" id="reset-btn">Reset all</button>
    </div>
  </header>
  <div class="content" id="content"></div>
</div>

<script>
'use strict';

// ── Data ───────────────────────────────────────────────────────────────────────
// auto: true = covered by test-api.js automated suite
const SECTIONS = [
{
  id:'auth', title:'1. Authentication',
  cases:[
    {id:'A-01',scenario:'Login — valid credentials',
     steps:'POST /api/auth/login with correct email + password',
     expected:'200 OK, httpOnly JWT cookie set, user object (id, email, role) returned in body',auto:true},
    {id:'A-02',scenario:'Login — wrong password',
     steps:'POST /api/auth/login with correct email but wrong password',
     expected:'401 — generic "Invalid credentials" message, no hint about which field is wrong',auto:true},
    {id:'A-03',scenario:'Login — disabled user',
     steps:'POST /api/auth/login with credentials of a disabled account',
     expected:'403 — login refused even if credentials are valid'},
    {id:'A-04',scenario:'Login — unknown email',
     steps:'POST /api/auth/login with a non-existent email address',
     expected:'401 — same generic message as A-02 (no user enumeration)',auto:true},
    {id:'A-05',scenario:'Unauthenticated page access → redirect',
     steps:'Open any authenticated page (e.g. pipeline.html) without a valid session cookie',
     expected:'Browser is redirected to /login.html',auto:true},
    {id:'A-06',scenario:'Logout',
     steps:'Click Logout in the account dropdown; then try to open pipeline.html',
     expected:'Cookie cleared; next page load redirects to login'},
    {id:'A-07',scenario:'Invite flow — full cycle',
     steps:'Admin invites a new email → user clicks link in email → sets password on activate.html',
     expected:'Account status changes from pending to active; user can log in with the new password'},
    {id:'A-08',scenario:'Invite token expired',
     steps:'Use an invite link that was generated more than 48 h ago',
     expected:'400 or 401 — "Token expired or invalid" error shown on activate.html'},
    {id:'A-09',scenario:'Duplicate invite email',
     steps:'Admin attempts to invite an email address that already has an account',
     expected:'409 or a meaningful inline error — no duplicate account created'},
    {id:'A-10',scenario:'Password reset — full cycle',
     steps:'Request reset for a valid email → click link in email → set new password on reset-password.html',
     expected:'Login succeeds with new password; old password no longer accepted'},
    {id:'A-11',scenario:'Password reset token expired',
     steps:'Use a reset link older than 2 h',
     expected:'400 or 401 — "Token expired" error shown'},
    {id:'A-12',scenario:'Change password — correct current',
     steps:'Open change-password modal → supply correct current password + new password → submit',
     expected:'Password updated; logging in again with old password fails'},
    {id:'A-13',scenario:'Change password — wrong current',
     steps:'Open change-password modal → supply an incorrect current password → submit',
     expected:'400 or 403 — password not changed, error shown inline'},
  ]
},
{
  id:'nav', title:'2. Navigation & Navbar',
  cases:[
    {id:'N-01',scenario:'Nav tabs load correct pages',
     steps:'Click each top tab: Pipeline, Reporting, Planning',
     expected:'Correct page loads; clicked tab is highlighted as active; other tabs are not'},
    {id:'N-02',scenario:'Account dropdown',
     steps:'Click the user avatar / name in the top-right corner',
     expected:'Dropdown shows: full name, Settings, Change Password, Logout options'},
    {id:'N-03',scenario:'Settings modal — two tabs',
     steps:'Open Settings → switch between tabs',
     expected:'"API & Integrations" tab shows AI provider key fields; "Data Manager" tab shows export and backup controls'},
    {id:'N-04',scenario:'Non-admin access to config.html',
     steps:'Log in as a user with role=user; navigate directly to /config.html',
     expected:'"Admin access required" message shown — tabs and content are not accessible'},
    {id:'N-05',scenario:'Non-admin access to admin.html',
     steps:'Log in as role=user; navigate to /admin.html',
     expected:'"Admin access required" message or redirect — user management not accessible'},
    {id:'N-06',scenario:'Non-admin access to timesheets.html',
     steps:'Log in as role=user; navigate to /timesheets.html',
     expected:'Redirected to /pipeline.html or "access denied" shown'},
  ]
},
{
  id:'pipeline', title:'3. Pipeline Board',
  cases:[
    {id:'P-01',scenario:'Board renders correctly',
     steps:'Open /pipeline.html as an authenticated user',
     expected:'Five kanban columns: SIP, Expected, Anticipated, Committed, Canceled — each with a header and budget total footer'},
    {id:'P-02',scenario:'Year dropdown shows all visible years',
     steps:'Click the pipeline year selector in the board header',
     expected:'Dropdown lists only the years marked as Visible (active) in config; hidden years do not appear'},
    {id:'P-03',scenario:'Year switch reloads board',
     steps:'Select a different year from the dropdown',
     expected:'URL updates with ?year=YYYY; board reloads showing cost grids for that year; column totals update'},
    {id:'P-04',scenario:'Invalid year in URL',
     steps:'Navigate manually to /pipeline.html?year=9999 (a year not in pipeline_years)',
     expected:'Silently redirected to the default active year; board loads normally'},
    {id:'P-05',scenario:'Inactive year access (non-admin)',
     steps:'Navigate to a URL with a year that has been hidden by admin',
     expected:'403 from API; board shows empty state or error message — no cost grids visible'},
    {id:'P-06',scenario:'Draft stage invisible to others',
     steps:'Create a Draft cost grid as User A; log in as User B and view the same year',

    {id:'P-07',scenario:'Draft grid visible to creator',

    {id:'P-08',scenario:'New Cost Grid button',

     expected:'Modal opens; filling in name + client + submit creates a new grid that appears on the board immediately'},
    {id:'P-09',scenario:'New CG button hidden for inactive year (admin)',
     steps:'Admin navigates to a board for a hidden year',
     expected:'"+  New Cost Grid" button is not displayed; read-only view only'},
    {id:'P-10',scenario:'Detail panel opens',
     steps:'Click on any cost grid card on the board',
     expected:'Detail panel slides in from the right showing offer metadata (name, stage, client, dates) and task/phase breakdown'},
    {id:'P-11',scenario:'Detail panel closes',
     steps:'Click × in the detail panel header',
     expected:'Panel closes; board is fully visible again'},
    {id:'P-12',scenario:'POT summary in panel — with target',
     steps:'Open detail panel for a CG linked to a client that has a POT target for the current year',
     expected:'POT section shows target amount and a progress bar reflecting committed vs target'},
    {id:'P-13',scenario:'POT summary in panel — no target',
     steps:'Open detail panel for a CG whose client has no POT set for the current year',
     expected:'POT section absent or shows "No target set" gracefully'},
    {id:'P-14',scenario:'Edit button navigates to cost grid editor',
     steps:'Open detail panel → click ✏️ Edit',
     expected:'Browser navigates to /costgrid.html?cgId=...&verId=... with the correct IDs'},
    {id:'P-15',scenario:'Share button opens share modal',

    {id:'P-16',scenario:'Column totals calculate correctly',

    {id:'P-17',scenario:'Budget on card — Draft and all version types',
     steps:'Open board with a Draft cost grid that has tasks and roles with rates',
     expected:'Card shows a fee amount (not "No budget") — the /api/cost-grids/budgets endpoint covers Draft versions directly from the task_roles table'},
    {id:'P-18',scenario:'PTC shown separately on card',
     steps:'Open board with a proposal that has pass-through costs entered in at least one task',

    {id:'P-19',scenario:'Client name on card after reload',

    {id:'P-20',scenario:'Rate card shown in detail panel',
     steps:'Set a rate card on a version → open the detail panel by clicking the card',

    {id:'P-21',scenario:'Project name on card after reload',

     expected:'Pipeline card shows the saved project name (not the cost grid name) after reload'},
    {id:'P-22',scenario:'Column total — professional fees only',
     steps:'Create proposals with both fees and PTC in the same stage column',
     expected:'Column footer main value = professional fees only; PTC not included in the main total'},
    {id:'P-23',scenario:'Column total — PTC secondary line',
     steps:'Create a proposal with PTC > 0 in the same column',
     expected:'PTC shown as a smaller muted line below the fee total; no standalone € symbol rendered before the value'},
    {id:'P-24',scenario:'Column total — no PTC line when zero',
     steps:'Create a proposal with no PTC in that column',
     expected:'Only the fee line shown; the muted PTC line is absent when ptc = 0'},
    {id:'P-25',scenario:'Version tabs — single version',
     steps:'Open detail panel for a cost grid that has only one version',
     expected:'No version tab row is rendered above the two-column body'},
    {id:'P-26',scenario:'Version tabs — multiple versions',
     steps:'Open detail panel for a cost grid with V1 and V2',
     expected:'Version tab row appears at the top of the panel; each tab shows a colored stage dot and version label'},
    {id:'P-27',scenario:'Version tab switch in panel',
     steps:'Click a different version tab in the detail panel',
     expected:'Panel content reloads for the selected version; clicked tab is highlighted as active'},
    {id:'P-28',scenario:'Clone from detail panel — modal opens',
     steps:'Open detail panel → click ⧉ Clone',
     expected:'Clone modal opens pre-filled: source name shows the currently viewed version; target name defaults to "[CG name] — Copy"'},
    {id:'P-29',scenario:'Clone creates v1 label regardless of source',
     steps:'Clone a version labelled V2 or V3',
     expected:'Resulting new cost grid has a single version labelled "v1", not the source label'},
    {id:'P-30',scenario:'Clone result opens in editor',
     steps:'Complete the clone flow (name + confirm)',
     expected:'Editor navigates to costgrid.html?cgId=<new>&verId=<new>; cloned phase/task/role structure is intact'},
  ]
},
{
  id:'costgrid', title:'4. Cost Grid Editor',

    {id:'CG-03',scenario:'Add task inside a phase',
     steps:'Click "+ Add Task" inside an existing phase row',
     expected:'New task row appears under that phase; can be named; appears in totals'},

     steps:'Type a number into any task × role cell',

     steps:'Edit a task, wait for autosave timer, immediately click Clone',
     expected:'Clone completes cleanly; autosave timer was cleared before clone; no concurrent save error or 500 on the source'},
  ]
},
{
  id:'portfolio', title:'5. Project Reporting (Portfolio)',
  cases:[
    {id:'R-01',scenario:'Portfolio page loads',
     steps:'Open /portfolio.html',

    {id:'R-02',scenario:'Filter by client',

    {id:'R-03',scenario:'KPI cards',

    {id:'REG-09',scenario:'Client and ratecard persist across reloads',
     steps:'Set client + ratecard on a version; save; reload page; reopen the cost grid editor',
     expected:'Client dropdown and ratecard dropdown both show the previously saved values; a client-specific ratecard is not reset to None because clientId is now persisted in DB'},
    {id:'REG-10',scenario:'Project name persists across reloads',
     steps:'Enter project name in the cost grid editor; save; reload page; reopen the editor',
     expected:'"Project name" field shows the saved value; pipeline card shows the same name (not the cost grid name)'},
  ]
},
];

// ── State ──────────────────────────────────────────────────────────────────────
const KEY = 'pdash_test_state_v1';
let state = {};
try { state = JSON.parse(localStorage.getItem(KEY) || '{}'); } catch { state = {}; }

function getS(id) { return state[id] || 'untested'; }
function nextS(s)  { return s==='untested'?'pass': s==='pass'?'fail':'untested'; }
function saveState() { localStorage.setItem(KEY, JSON.stringify(state)); }

// ── Computed ───────────────────────────────────────────────────────────────────
function allCases() { return SECTIONS.flatMap(s=>s.cases); }

function secStats(sec) {
  const p=sec.cases.filter(c=>getS(c.id)==='pass').length;
  const f=sec.cases.filter(c=>getS(c.id)==='fail').length;
  const u=sec.cases.length-p-f;
  return {p,f,u,total:sec.cases.length};
}

function globalStats() {
  const all=allCases();
  const p=all.filter(c=>getS(c.id)==='pass').length;
  const f=all.filter(c=>getS(c.id)==='fail').length;
  return {p,f,u:all.length-p-f,total:all.length};
}

// ── Filters ────────────────────────────────────────────────────────────────────
let sectionFilter='all';
let statusFilter='all';

// ── Render ─────────────────────────────────────────────────────────────────────
function togClass(s){ return s==='pass'?'pass':s==='fail'?'fail':''; }
function togIcon(s) { return s==='pass'?'✓':s==='fail'?'✗':'○'; }

function renderSidebar() {
  const gs=globalStats();
  const links=SECTIONS.map(sec=>{
    const {p,f,total}=secStats(sec);
    const done=p+f;
    const col=p===total?'#16a34a':f>0?'#dc2626':'#6b7280';
    const active=sectionFilter===sec.id?'active':'';
    return `<div class="sb-link ${active}" data-sec="${sec.id}">
      <span class="dot" style="background:${col}"></span>
      <span class="name">${sec.title}</span>
      <span class="cnt">${p}/${total}</span>
    </div>`;
  }).join('');

  document.getElementById('sidebar').innerHTML=`
    <div class="sb-head">PDash Test Cases<small>Last saved: ${new Date().toLocaleDateString()}</small></div>
    <div class="sb-link ${sectionFilter==='all'?'active':''}" data-sec="all">
      <span class="dot" style="background:#2563eb"></span>
      <span class="name"><strong>All sections</strong></span>
      <span class="cnt">${gs.p}/${gs.total}</span>
    </div>
    ${links}
  `;

  document.querySelectorAll('.sb-link').forEach(el=>{
    el.addEventListener('click',()=>{
      sectionFilter=el.dataset.sec;
      render();
    });
  });
}

function renderTopbar() {
  const {p,f,u,total}=globalStats();
  const pct=total>0?Math.round(p/total*100):0;

  document.getElementById('stats').innerHTML=`
    <span class="stat-badge pass">✓ ${p} passed</span>
    <span class="stat-badge fail">✗ ${f} failed</span>
    <span class="stat-badge un">⬜ ${u} untested</span>
    <span style="color:#9ca3af">${pct}% complete</span>
  `;
  document.getElementById('prog-fill').style.width=pct+'%';
}

function renderContent() {
  const sections=sectionFilter==='all'?SECTIONS:SECTIONS.filter(s=>s.id===sectionFilter);
  const html=sections.map(sec=>{
    const {p,total}=secStats(sec);
    const pct=total>0?Math.round(p/total*100):0;

    // Group sub-labels for section 10
    const subMap={};
    if(sec.sub){
      sec.sub.forEach(sub=>{
        const ids=sec.cases
          .filter(c=>c.id>=sub.start && c.id<=sub.end)
          .map(c=>c.id);
        ids.forEach(id=>{ subMap[id]=sub.title; });
      });
    }

    let lastSub='';
    const cardsHtml=sec.cases.map(c=>{
      const s=getS(c.id);
      const vis=statusFilter==='all'||statusFilter===s;
      let subLabel='';
      if(subMap[c.id] && subMap[c.id]!==lastSub){
        lastSub=subMap[c.id];
        subLabel=`<div class="sub-title">${lastSub}</div>`;
      }
      return `${subLabel}<div class="case-card s-${s} ${vis?'':'hidden'}" data-id="${c.id}">
        <button class="tog ${togClass(s)}" data-id="${c.id}" title="Click to toggle: untested → pass → fail">${togIcon(s)}</button>
        <div class="cb">
          <div class="ch">
            <span class="cid">${c.id}</span>
            <span class="sc">${c.scenario}</span>
            ${c.auto?'<span class="auto-badge">API auto</span>':''}
          </div>
          ${c.steps?`<div class="steps">${c.steps}</div>`:''}
          <div class="exp">${c.expected}</div>
        </div>
      </div>`;
    }).join('');

    return `<div class="sec-block" id="sec-${sec.id}">
      <div class="sec-head">
        <h2>${sec.title}</h2>
        <div class="sec-mini-wrap">
          <div class="sec-mini-bar"><div class="sec-mini-fill" style="width:${pct}%"></div></div>
          <span class="sec-mini-txt">${p}/${total}</span>
        </div>
      </div>
      ${cardsHtml}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML=html;

  // Toggle click handlers
  document.querySelectorAll('.tog').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const id=btn.dataset.id;
      state[id]=nextS(getS(id));
      saveState();
      render();
    });
  });
}

function render() {
  renderSidebar();
  renderTopbar();
  renderContent();
}

// ── Filter pills ───────────────────────────────────────────────────────────────
document.querySelectorAll('.pill[data-status]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    statusFilter=btn.dataset.status;
    document.querySelectorAll('.pill[data-status]').forEach(b=>{
      b.classList.toggle('active', b.dataset.status===statusFilter);
    });
    render();
  });
});

// ── Reset ──────────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click',()=>{
  if(!confirm('Reset all test results? This cannot be undone.')) return;
  state={};
  saveState();
  render();
});

// ── Init ───────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
