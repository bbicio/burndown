events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  server {
    listen 80;

    # ── AUTH SUBREQUEST ────────────────────────────────────────────────────────
    # nginx sends a HEAD-style subrequest here before serving protected content.
    # The API reads the httpOnly JWT cookie and returns 200 (ok) or 401 (not auth).
    location = /auth-check {
      internal;
      proxy_pass              http://api:3000/api/auth/me;
      proxy_pass_request_body off;
      proxy_set_header        Content-Length "";
      proxy_set_header        X-Original-URI $request_uri;
    }

    # ── REDIRECT TARGET ────────────────────────────────────────────────────────
    location @to_login {
      return 302 /login.html;
    }

    # ── API PROXY (no nginx-level auth — API guards itself) ────────────────────
    location /api/ {
      proxy_pass         http://api:3000;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── PUBLIC PAGES (no auth) ─────────────────────────────────────────────────
    location ~ ^/(login|activate|reset-password)\.html$ {
      root /usr/share/nginx/html;
    }

    # ── PUBLIC ASSETS (no auth — needed by login/activate pages) ──────────────
    location ~ ^/(css|js)/ {
      root /usr/share/nginx/html;
    }

    # ── PROTECTED APP ──────────────────────────────────────────────────────────
    # Everything else (index.html, SPA routes) requires a valid JWT cookie.
    location / {
      auth_request  /auth-check;
      error_page 401 = @to_login;

      root  /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
