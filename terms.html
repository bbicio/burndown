<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDash — Terms of Use & Privacy Notice</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/tokens.css?v=5">
  <style>
    body {
      background: var(--surface-light);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
    }
    .terms-header {
      background: var(--brand-navy);
      border-bottom: 3px solid var(--brand-magenta);
      padding: 14px 32px;
      display: flex;
      align-items: center;
    }
    .brand-name { font-weight: 700; font-size: 2rem; letter-spacing: -0.5px; color: #fff; line-height: 1; }
    .brand-name .p { color: var(--brand-magenta); }
    .terms-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      padding: 2.5rem 3rem;
      max-width: 780px;
      margin: 40px auto 60px;
    }
    h1 { font-size: 1.5rem; font-weight: 700; color: var(--brand-navy); }
    h2 { font-size: 1.05rem; font-weight: 700; color: var(--brand-navy); margin-top: 1.6rem; margin-bottom: .5rem; }
    p, li { font-size: .92rem; color: var(--text-body); line-height: 1.7; }
    .version-badge {
      font-size: .72rem; background: var(--surface-subtle); color: var(--text-muted);
      border-radius: 20px; padding: 2px 10px; font-weight: 600; display: inline-block; margin-left: 10px; vertical-align: middle;
    }
    .confirm-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: #fff;
      border-top: 1px solid var(--border-light, #e9ecef);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      box-shadow: 0 -4px 16px rgba(0,0,0,0.06);
    }
    .confirm-bar label { font-size: .9rem; color: var(--text-primary); cursor: pointer; user-select: none; }
    #btnAccept { min-width: 200px; }
    #errMsg { color: #dc3545; font-size: .83rem; display: none; }
  </style>
</head>
<body>

  <div class="terms-header">
    <span class="brand-name"><span class="p">P</span>Dash</span>
    <span style="color:rgba(255,255,255,.5);margin-left:16px;font-size:.85rem">Terms of Use &amp; Privacy Notice</span>
  </div>

  <div class="terms-card">
    <h1>Terms of Use &amp; Privacy Notice <span class="version-badge" id="versionLabel">…</span></h1>
    <p style="color:var(--text-muted);font-size:.82rem" id="effectiveDate">Loading…</p>
    <div id="termsBody" style="min-height:200px"></div>
    <div style="height:80px"></div>
  </div>

  <div class="confirm-bar">
    <div class="d-flex align-items-center gap-3">
      <input type="checkbox" id="chkRead" class="form-check-input" style="width:1.2em;height:1.2em;cursor:pointer;margin-top:0">
      <label for="chkRead">I have read and understood this notice</label>
    </div>
    <div class="d-flex align-items-center gap-3">
      <span id="errMsg">Please confirm you have read the notice before continuing.</span>
      <button id="btnAccept" class="btn btn-primary" style="background:var(--brand-navy);border-color:var(--brand-navy)">
        Continue to PDash
      </button>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const next   = params.get('next') || '/pipeline.html';

    const btn    = document.getElementById('btnAccept');
    const chk    = document.getElementById('chkRead');
    const errMsg = document.getElementById('errMsg');

    // Load T&C content from API
    (async () => {
      try {
        const r = await fetch('/api/app-settings/terms', { credentials: 'include' });
        if (r.status === 401) { window.location.href = '/login.html'; return; }
        const d = await r.json();
        document.getElementById('versionLabel').textContent = 'v' + d.version;
        document.getElementById('effectiveDate').textContent =
          d.updatedAt
            ? 'Effective from: ' + new Date(d.updatedAt).toLocaleDateString('en-GB', { year: 'numeric', month: 'long', day: 'numeric' })
            : '';
        document.getElementById('termsBody').innerHTML = d.content;
      } catch (e) {
        document.getElementById('termsBody').textContent = 'Unable to load terms. Please refresh or contact your administrator.';
      }
    })();

    // Button disabled until checkbox is ticked
    btn.disabled = true;
    btn.style.opacity = '0.5';

    chk.addEventListener('change', () => {
      btn.disabled = !chk.checked;
      btn.style.opacity = chk.checked ? '1' : '0.5';
      errMsg.style.display = 'none';
    });

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = 'Saving…';
      try {
        const r = await fetch('/api/auth/accept-terms', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' }
        });
        if (r.status === 401) { window.location.href = '/login.html'; return; }
        if (!r.ok) throw new Error('Server error ' + r.status);
        window.location.href = next;
      } catch (e) {
        btn.disabled = false;
        btn.style.opacity = '1';
        btn.textContent = 'Continue to PDash';
        errMsg.textContent = 'Could not save. Please try again.';
        errMsg.style.display = 'inline';
      }
    });
  </script>
</body>
</html>
