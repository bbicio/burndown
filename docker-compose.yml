version: '3.9'

services:

  db:
    image: postgres:16-alpine
    container_name: pdash-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pdash}
      POSTGRES_USER: ${POSTGRES_USER:-pdash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pdash}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./api
    container_name: pdash-api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pdash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pdash}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      APP_URL: ${APP_URL:-http://localhost}
      NODE_ENV: ${NODE_ENV:-development}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api/src:/app/src   # hot reload in development
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/api/auth/me',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 20s

  # ── Integration test runner ───────────────────────────────────────────────────
  # Usage: docker compose --profile test run --rm test
  # Exit code 0 = all tests pass; 1 = one or more failures.
  test:
    image: node:24-alpine
    profiles: ["test"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-pdash}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-pdash}
      API_URL: http://api:3000
      TEST_ADMIN_EMAIL: ${TEST_ADMIN_EMAIL:-test-admin@pdash.local}
      TEST_ADMIN_PASSWORD: ${TEST_ADMIN_PASSWORD:-TestAdmin123!}
    volumes:
      - ./api/src:/app/src        # for create-admin.js
      - ./test-api.js:/app/test-api.js
    working_dir: /app
    command: >
      sh -c "
        npm install --prefix /tmp pg bcryptjs --silent --no-audit --no-fund &&
        NODE_PATH=/tmp/node_modules node src/create-admin.js $$TEST_ADMIN_EMAIL $$TEST_ADMIN_PASSWORD Test Admin &&
        node test-api.js
      "

  adminer:
    image: adminer:latest
    container_name: pdash-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  nginx:
    image: nginx:alpine
    container_name: pdash-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
